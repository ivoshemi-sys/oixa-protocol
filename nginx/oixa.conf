# ─────────────────────────────────────────────────────────────────────────────
# OIXA Protocol — nginx config
# Place at: /etc/nginx/sites-available/oixa
# Enable with: ln -s /etc/nginx/sites-available/oixa /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d oixa.io -d www.oixa.io
# ─────────────────────────────────────────────────────────────────────────────

# Redirect www → apex
server {
    listen 80;
    server_name www.oixa.io;
    return 301 https://oixa.io$request_uri;
}

server {
    listen 80;
    server_name oixa.io 64.23.235.34;

    # Let's Encrypt ACME challenge (certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # All other traffic → redirect to HTTPS (once SSL is set up)
    # Remove this block if you want to keep HTTP for now
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Proxy everything to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # CORS is handled by FastAPI — don't duplicate here
    }

    # Serve landing page at root (bypass FastAPI for static HTML)
    # Uncomment after first deploy to serve from filesystem directly (faster)
    # location = / {
    #     root /opt/oixa-protocol/server/static;
    #     try_files /index.html =404;
    # }

    # Dashboard
    location = /dashboard {
        proxy_pass http://127.0.0.1:8000/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}

# HTTPS — certbot will add this block automatically
