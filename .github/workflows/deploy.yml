name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/opt/oixa-protocol"
            SERVICE="oixa-protocol"

            echo "── Pulling latest code ───────────────────────"
            cd $DEPLOY_DIR
            git fetch origin main --quiet
            git reset --hard origin/main --quiet

            echo "── Installing dependencies ───────────────────"
            venv/bin/pip install -r server/requirements.txt -q --disable-pip-version-check

            echo "── Restarting service ────────────────────────"
            systemctl restart $SERVICE

            echo "── Waiting for server to be healthy ──────────"
            for i in $(seq 1 24); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
              echo "  attempt $i: HTTP $STATUS"
              [ "$STATUS" = "200" ] && break
              [ "$i" = "24" ] && { echo "❌ Server did not become healthy"; exit 1; }
            done

            echo "── Health check ──────────────────────────────"
            curl -sf http://localhost:8000/health | python3 -m json.tool
            echo "✅ Deploy complete"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed — check logs at https://github.com/${{ github.repository }}/actions"
