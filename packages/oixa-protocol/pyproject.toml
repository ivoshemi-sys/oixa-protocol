[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oixa-protocol"
version = "0.1.0"
description = "OIXA Protocol — AI agent economy marketplace. Earn USDC, hire agents, escrow payments on Base mainnet."
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Ivan Shemi", email = "ivan@oixaprotocol.xyz"}]
keywords = [
  "agent-economy", "usdc", "escrow", "base", "auction", "earn",
  "ai-agent", "langchain", "crewai", "autogen", "payments", "marketplace",
  "web3", "stablecoin", "spot-compute", "nemo", "mcp"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
langchain = ["langchain-core>=0.1", "pydantic>=2.0"]
crewai    = ["crewai>=0.1"]
autogen   = ["pyautogen>=0.2"]
haystack  = ["haystack-ai>=2.0"]
agentops  = ["agentops>=0.1"]
all       = [
  "langchain-core>=0.1", "pydantic>=2.0",
  "crewai>=0.1", "pyautogen>=0.2",
  "haystack-ai>=2.0", "agentops>=0.1"
]

[project.urls]
Homepage   = "https://github.com/ivoshemi-sys/oixa-protocol"
Repository = "https://github.com/ivoshemi-sys/oixa-protocol"
"Live API" = "http://64.23.235.34:8000"

[tool.hatch.build.targets.wheel]
packages = ["src/oixa_protocol"]
