version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oixa
      POSTGRES_USER: oixa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oixa_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oixa"]
      interval: 5s
      timeout: 5s
      retries: 5

  oixa:
    build: .
    restart: unless-stopped
    ports:
      - "${OIXA_PORT:-8000}:8000"
    environment:
      - OIXA_HOST=0.0.0.0
      - OIXA_PORT=8000
      - OIXA_DEBUG=${OIXA_DEBUG:-false}
      - OPENCLAW_URL=${OPENCLAW_URL:-ws://127.0.0.1:18789}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID:-0}
      - DATABASE_URL=postgresql://oixa:${POSTGRES_PASSWORD:-oixa_secret}@postgres:5432/oixa
      - COMMISSION_RATE=${COMMISSION_RATE:-0.05}
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-50}
      - STAKE_PERCENTAGE=${STAKE_PERCENTAGE:-0.20}
      - PROTOCOL_WALLET=${PROTOCOL_WALLET:-}
      - PROTOCOL_WALLET_NETWORK=${PROTOCOL_WALLET_NETWORK:-base}
      - LOG_DIR=/var/log/oixa
    volumes:
      - oixa_logs:/var/log/oixa
      - oixa_db:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - oixa
    profiles:
      - tunnel

volumes:
  postgres_data:
  oixa_logs:
  oixa_db:
